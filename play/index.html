<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MMO — A Text Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0c1d;
            --fg: #c8c8d0;
            --dim: #6a6a7a;
            --prompt: #5f9ea0;
            --echo: #00e0e0;
            --error: #cc4444;
            --border: #2a2a3d;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Consolas, 'Liberation Mono', monospace;
            font-size: 15px;
            line-height: 1.5;
        }

        #terminal {
            position: relative;
            display: flex;
            flex-direction: column;
            height: calc(100% - 16px);
            max-width: 82ch;
            margin: 8px auto;
            padding: 12px 16px;
            padding-bottom: max(20px, env(safe-area-inset-bottom, 16px));
            border: 1px solid #333;
            border-radius: 4px;
        }

        #copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 4px 6px;
            border-radius: 3px;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
            transition: color 0.2s, border-color 0.2s;
        }
        #copy-btn:hover {
            color: var(--fg);
            border-color: var(--fg);
        }
        #copy-btn.copied {
            color: #5f9;
            border-color: #5f9;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg);
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: var(--bg); }
        #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .output-line {
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 1.5em;
        }

        .input-echo {
            color: var(--echo);
            white-space: pre-wrap;
        }

        .input-prompt {
            color: #888;
            font-weight: bold;
        }

        .output-line strong {
            font-weight: bold;
            color: #e0e0e0;
        }

        .error-line {
            color: var(--error);
            white-space: pre-wrap;
        }

        #input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            flex-shrink: 0;
        }

        #input-line .prompt {
            color: var(--prompt);
            margin-right: 8px;
            user-select: none;
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            outline: none;
            caret-color: var(--prompt);
        }

        #input::placeholder {
            color: var(--dim);
        }

        #input:disabled {
            opacity: 0.5;
        }

        .status-line {
            color: #888;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--dim);
            flex-shrink: 0;
            min-height: 1.5em;
            white-space: nowrap;
            overflow: hidden;
        }
        #status-bar .status-left {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #status-bar .status-right {
            margin-left: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <button id="copy-btn" title="Copy output to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        </button>
        <div id="status-bar">
            <span class="status-left"></span>
            <span class="status-right"></span>
        </div>
        <div id="output"></div>
        <div id="input-line">
            <span class="prompt">&gt;</span>
            <input type="text" id="input" autofocus autocomplete="off"
                   spellcheck="false" placeholder="Type a command..." disabled>
        </div>
    </div>

    <script>
        // --- Boot log: initial status message (before any other scripts load) ---
        (function() {
            var out = document.getElementById('output');
            window.logStatus = function(msg) {
                var div = document.createElement('div');
                div.className = 'output-line status-line';
                div.textContent = msg;
                out.appendChild(div);
                out.scrollTop = out.scrollHeight;
            };
            window.logStatus("Loading Bootstrapper...");
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js"></script>
    <script src="bootstrapper.js?v=20260323165930"></script>
</body>
</html>
