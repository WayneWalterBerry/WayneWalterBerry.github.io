<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>MMO — A Text Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0c1d;
            --fg: #c8c8d0;
            --dim: #6a6a7a;
            --prompt: #5f9ea0;
            --echo: #7a7a8a;
            --error: #cc4444;
            --border: #2a2a3d;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Consolas, 'Liberation Mono', monospace;
            font-size: 15px;
            line-height: 1.5;
        }

        #terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 82ch;
            margin: 0 auto;
            padding: 12px 16px;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--bg);
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: var(--bg); }
        #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .output-line {
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 1.5em;
        }

        .input-echo {
            color: var(--echo);
            white-space: pre-wrap;
        }

        .error-line {
            color: var(--error);
            white-space: pre-wrap;
        }

        #input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            flex-shrink: 0;
        }

        #input-line .prompt {
            color: var(--prompt);
            margin-right: 8px;
            user-select: none;
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            outline: none;
            caret-color: var(--prompt);
        }

        #input::placeholder {
            color: var(--dim);
        }

        #input:disabled {
            opacity: 0.5;
        }

        #loading {
            color: var(--prompt);
            padding: 20px 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #loading.hidden { display: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">
            <div id="loading">Loading game engine...</div>
        </div>
        <div id="input-line">
            <span class="prompt">&gt;</span>
            <input type="text" id="input" autofocus autocomplete="off"
                   spellcheck="false" placeholder="Type a command..." disabled>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js"></script>
    <script src="game-bundle.js"></script>
    <script>
        // --- Terminal UI (JavaScript side) ---
        const outputEl = document.getElementById('output');
        const inputEl  = document.getElementById('input');

        // Append a line to the terminal output
        function appendOutput(text, className) {
            const div = document.createElement('div');
            div.className = className || 'output-line';
            if (!text && text !== 0) {
                div.innerHTML = '&nbsp;';
            } else {
                div.textContent = String(text);
            }
            outputEl.appendChild(div);
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // Expose to Lua adapter
        window._appendOutput = appendOutput;

        // Command history (arrow-key recall)
        const history = [];
        let historyIndex = -1;

        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const text = inputEl.value;
                if (text.trim() === '') return;
                inputEl.value = '';
                history.push(text);
                historyIndex = history.length;

                // Echo command in output
                appendOutput('> ' + text, 'input-echo');

                // Send to Lua game engine
                if (window._gameProcessCommand) {
                    try {
                        window._gameProcessCommand(text);
                    } catch (err) {
                        appendOutput('[Error: ' + err.message + ']', 'error-line');
                        console.error(err);
                    }
                } else {
                    appendOutput('[Game engine still loading...]', 'error-line');
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputEl.value = history[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    inputEl.value = history[historyIndex];
                } else {
                    historyIndex = history.length;
                    inputEl.value = '';
                }
            }
        });

        // Focus input on click anywhere in terminal
        document.getElementById('terminal').addEventListener('click', function() {
            inputEl.focus();
        });
    </script>

    <script type="application/lua" src="game-adapter.lua"></script>
</body>
</html>
